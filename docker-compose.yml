services:
  app:
    build: .
    container_name: activity-tracker
    ports:
      - "80:80"
    volumes:
      - sqlite-data:/var/www/html/database
      - storage-data:/var/www/html/storage
    environment:
      - APP_NAME=ActivityTracker
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - SESSION_DRIVER=file
      - CACHE_DRIVER=file
    restart: unless-stopped

volumes:
  sqlite-data:
  storage-data:
